<!DOCTYPE html>
<html lang="zh-MO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳门空气质量监测平台</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>澳门空气质量监测平台</h1>
            <div class="datetime-display">
                <span id="current-datetime">--</span>
            </div>
            <div id="weather-info" class="weather-info">
                <span id="temperature">--°C</span>
                <span id="humidity">湿度: --%</span>
                <span id="wind">风速: -- km/h</span>
            </div>
        </header>

        <main>
            <div id="map"></div>
            
            <div id="info-panel" class="info-panel">
                <h2>监测站信息</h2>
                <p class="hint">点击地图上的标记查看详细信息</p>
                <div id="station-details"></div>
            </div>
        </main>

        <footer>
            <p>数据来源：澳门地球物理暨气象局 | 更新时间: <span id="update-time">--</span></p>
        </footer>
    </div>

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    
    <!-- 自定义脚本 -->
    <script src="js/dataParser.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
