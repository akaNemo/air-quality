<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macau Air Quality Monitoring Platform</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>Macau Air Quality Monitoring Platform</h1>
        <div class="datetime" id="current-datetime">--</div>
    </div>

    <!-- Weather Bar -->
    <div class="weather-bar">
        <div class="weather-item" id="temperature">--°C</div>
        <div class="weather-item" id="humidity">Humidity: --%</div>
        <div class="weather-item" id="wind">Wind Speed: -- km/h</div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Left Column: Map and Charts -->
        <div class="left-section">
            <div class="map-section">
                <div id="map"></div>
            </div>

            <!-- WAQI Charts Section -->
            <div class="waqi-charts-section">
                <div class="waqi-chart-header">
                    <h3>📊 WAQI Historical Trends</h3>
                    <select id="waqi-station-selector" class="station-selector">
                        <option value="">Select Station...</option>
                    </select>
                </div>
                <div id="waqi-widget-container" class="waqi-widget">
                    <div class="waqi-placeholder">👆 Please select a station to view detailed charts</div>
                </div>
            </div>
        </div>

        <!-- Right Column: Info Panel -->
        <div class="info-panel">
            <h2>Station Information</h2>
            <div class="hint">Click on a station on the map to view details</div>
            
            <div id="station-details">
                <!-- Content will be injected by JS -->
            </div>
            
            <!-- Removed the update-info div as requested -->
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/dataParser.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
