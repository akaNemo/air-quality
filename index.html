<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macau Air Quality Monitoring Platform</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Chart.js (唯一新增) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="header-container">
        <div class="header">
            <h1>Macau Air Quality Monitoring Platform</h1>
            <div class="datetime" id="current-datetime">--</div>
        </div>
        
        <div class="weather-bar">
            <div class="weather-item">
                <span class="weather-icon">🌡️</span>
                <span id="temperature">--°C</span>
            </div>
            <div class="weather-item">
                <span class="weather-icon">💧</span>
                <span id="humidity">Humidity: --%</span>
            </div>
            <div class="weather-item">
                <span class="weather-icon">💨</span>
                <span id="wind">Wind Speed: -- km/h</span>
            </div>
        </div>
    </div>

    <div class="main-dashboard">
        <!-- Top Section: Map & Info -->
        <div class="top-section">
            <div class="map-card">
                <div id="map"></div>
            </div>
            
            <div class="info-card">
                <div class="panel-header">
                    <h2>Station Information</h2>
                </div>
                <div class="info-panel-body" id="station-details">
                    <div class="hint">
                        <div style="font-size: 3em; margin-bottom: 10px;">👆</div>
                        <p>Click on a station on the map to view real-time pollutants and details.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Section: AI Analysis -->
        <div class="bottom-section">
            <div class="waqi-card">
                <div class="waqi-header-row">
                    <h3>📊 AI Trend Analysis & Historical Data</h3>
                    <select id="waqi-station-selector" class="station-selector">
                        <option value="">Select Station...</option>
                    </select>
                </div>
                <div id="waqi-widget-container" class="waqi-widget">
                    <div class="waqi-placeholder">
                        Select a station to view AI prediction models (LSTM/GRU)
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/dataParser.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
