<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳门空气质量监测平台</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="header">
        <h1>澳门空气质量监测平台</h1>
        <div class="datetime" id="current-datetime"></div>
    </div>

    <div class="weather-bar">
        <div class="weather-item" id="temperature">--°C</div>
        <div class="weather-item" id="humidity">湿度: --%</div>
        <div class="weather-item" id="wind">风速: -- km/h</div>
    </div>

    <div class="container">
        <div class="map-section">
            <div id="map"></div>
            
            <!-- WAQI图表区域 - 移到地图下方 -->
            <div class="waqi-charts-section">
                <div class="waqi-chart-header">
                    <h3>📊 WAQI 污染物历史趋势</h3>
                    <select id="waqi-station-selector" class="station-selector">
                        <option value="">选择监测站...</option>
                    </select>
                </div>
                <div id="waqi-widget-container" class="waqi-widget">
                    <div class="waqi-placeholder">
                        👆 请选择一个监测站查看详细历史数据图表
                    </div>
                </div>
            </div>
        </div>

        <div class="info-panel">
            <h2>监测站信息</h2>
            <div class="hint">点击地图上的监测站查看详细数据</div>
            <div id="station-details"></div>
            <div class="update-info">
                <small>数据更新时间: <span id="update-time">--</span></small>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/dataParser.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
